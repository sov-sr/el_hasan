<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-en="Welcome to El Hasan" data-ar="أهلاً بكم في الحسن"></title>
</head>
<body>
    <header>
        <div class="language-switcher">
            <button data-en="English" data-ar="العربية">Language</button>
        </div>
        <nav>
            <ul>
                <li data-en="Home" data-ar="الصفحة الرئيسية"></li>
                <li data-en="Products" data-ar="المنتجات"></li>
                <li data-en="About" data-ar="حول"></li>
                <li data-en="Contact" data-ar="اتصل"></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h1 data-en="Experience the Best" data-ar="جرب الأفضل"></h1>
    </section>
    <section class="products">
        <h2 data-en="Our Products" data-ar="منتجاتنا"></h2>
        <!-- Products will be listed here -->
    </section>
    <div class="shopping-cart-modal">
        <form>
            <h2 data-en="Checkout" data-ar="الدفع"></h2>
            <label data-en="Email" data-ar="البريد الإلكتروني">Email:</label>
            <input type="email" required>
            <label data-en="Phone" data-ar="الهاتف">Phone:</label>
            <input type="tel" required>
            <label data-en="Address" data-ar="العنوان">Address:</label>
            <input type="text" required>
            <button data-en="Submit" data-ar="إرسال">Submit</button>
        </form>
    </div>
    <section class="about">
        <h2 data-en="About Us" data-ar="معلومات عنا"></h2>
        <p data-en="We provide the best services." data-ar="نحن نوفر أفضل الخدمات."></p>
    </section>
    <section class="contact">
        <h2 data-en="Contact Us" data-ar="اتصل بنا"></h2>
        <p data-en="Email: example@example.com" data-ar="البريد الإلكتروني: example@example.com"></p>
        <p data-en="Phone: +123456789" data-ar="الهاتف: +123456789"></p>
        <p data-en="Address: 123 Street Name, City, Country" data-ar="العنوان: 123 اسم الشارع، المدينة، الدولة"></p>
    </section>
    <footer>
        <p data-en="Footer Content" data-ar="محتوى القدم"></p>
    </footer>
</body>
</html>
